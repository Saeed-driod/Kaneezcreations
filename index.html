  <meta name="keywords" content="kids wear, children clothing, girls dress, boys wear, infant clothing, Eid collection">
  
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Inter:wght@100..900&display=swap" rel="stylesheet">
  
  <!-- React and ReactDOM CDNs (Production versions) using jsDelivr for superior reliability -->
  <script src="https://cdn.jsdelivr.net/npm/react@18/umd/react.production.min.js" crossorigin></script>

  <!-- Babel Standalone for in-browser JSX compilation using jsDelivr -->
  <script src="https://cdn.jsdelivr.net/npm/@babel/standalone@7/babel.min.js"></script>

  <!-- Global Error Logger/Overlay -->
  <div id="error-boundary-overlay" style="display:none; position:fixed; inset:0; background:rgba(42,26,14,0.95); color:#ff8a80; padding:30px; font-family:monospace; z-index:99999; overflow-y:auto; font-size:14px; line-height:1.5; border:5px solid #c0392b;">
    <h2 style="color:#ff5252; margin-top:0; border-bottom:2px solid #ff5252; padding-bottom:10px; font-family:sans-serif;">⚠️ Kaneez Creations - Loading or Script Error</h2>
    <p style="color:#fff; font-family:sans-serif;">An unexpected error occurred while loading the application. See details below:</p>
    <pre id="error-boundary-details" style="background:#212121; padding:15px; border-radius:8px; border:1px solid #424242; white-space:pre-wrap; word-break:break-all; color:#ff8a80;"></pre>
    <button onclick="window.location.reload()" style="background:#c0392b; color:#fff; border:none; padding:10px 20px; border-radius:4px; font-weight:bold; cursor:pointer; margin-top:15px; font-family:sans-serif; transition: background 0.2s;">Reload Page</button>
  </div>
  <script>
    function showGlobalError(message, source, lineno, colno, error) {
      const overlay = document.getElementById('error-boundary-overlay');
      const details = document.getElementById('error-boundary-details');
      if (overlay && details) {
        let errText = `Error: ${message}\n`;
        if (source) errText += `Source: ${source}\n`;
        if (lineno) errText += `Line: ${lineno}, Col: ${colno}\n`;
        if (error && error.stack) {
          errText += `Stack: ${error.stack}\n`;
        }
        details.textContent = errText;
        overlay.style.display = 'block';
      }
    }
    window.onerror = function(message, source, lineno, colno, error) {
      showGlobalError(message, source, lineno, colno, error);
      return false;
    };
    window.addEventListener('unhandledrejection', function(event) {
      showGlobalError(event.reason ? event.reason.message : 'Unhandled Promise Rejection', null, null, null, event.reason);
    });
  </script>

  <style>
    /* Premium visual reset & custom scrollbar styling */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      margin: 0;
      font-family: 'Playfair Display', Georgia, serif;
      background: #fff9f5;
      color: #2a1a0e;

    /* Elegant scrollbars */
    ::-webkit-scrollbar {

    }
    ::-webkit-scrollbar-track {
      background: #fff9f5;
    }
    ::-webkit-scrollbar-thumb {
      background: #c0392b;

    }
    ::-webkit-scrollbar-thumb:hover {
      background: #8e1a0e;
    }

</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    const initialProducts = [
      { id: 1, name: "Floral Frock", category: "Girls", size: ["2-3Y","4-5Y","6-7Y"], price: 1200, stock: 15, image: "👗", description: "Beautiful floral printed frock with lace detailing", featured: true },
      { id: 2, name: "Denim Dungaree", category: "Boys", size: ["1-2Y","3-4Y","5-6Y"], price: 1500, stock: 10, image: "👖", description: "Comfortable denim dungaree perfect for playtime", featured: true },
      { id: 3, name: "Embroidered Suit", category: "Girls", size: ["4-5Y","6-7Y","8-9Y"], price: 2200, stock: 8, image: "👘", description: "Elegant embroidered suit for special occasions", featured: true },
      { id: 4, name: "T-Shirt & Shorts Set", category: "Boys", size: ["1-2Y","2-3Y","3-4Y"], price: 950, stock: 20, image: "👕", description: "Casual cotton t-shirt and shorts combo", featured: false },
      { id: 5, name: "Party Frock", category: "Girls", size: ["3-4Y","5-6Y","7-8Y"], price: 2800, stock: 5, image: "🎀", description: "Gorgeous party frock with ribbon and net layers", featured: true },
      { id: 6, name: "Kameez Shalwar", category: "Boys", size: ["2-3Y","4-5Y","6-7Y","8-9Y"], price: 1800, stock: 12, image: "🧥", description: "Traditional Pakistani kameez shalwar in premium fabric", featured: false },
      { id: 7, name: "Baby Romper", category: "Infants", size: ["0-3M","3-6M","6-9M","9-12M"], price: 750, stock: 25, image: "🍼", description: "Soft cotton romper for newborns and infants", featured: true },
      { id: 8, name: "Lehenga Choli", category: "Girls", size: ["3-4Y","5-6Y","7-8Y"], price: 3500, stock: 6, image: "✨", description: "Stunning lehenga choli for weddings and festivals", featured: false },
    ];

    // Safe localStorage wrapper to prevent crashes when running under file:// or with disabled cookies
    const safeLocalStorage = {
      getItem(key) {
        try {
          return localStorage.getItem(key);
        } catch (e) {
          console.warn("localStorage.getItem is blocked or unavailable:", e);
          return null;
        }
      },
      setItem(key, value) {
        try {
          localStorage.setItem(key, value);
        } catch (e) {
          console.warn("localStorage.setItem is blocked or unavailable:", e);
        }
      }
    };

    function KaneezCreations() {
      const [view, setView] = useState("home"); // home, shop, product
      const [products, setProducts] = useState(() => {
        try {
          const saved = safeLocalStorage.getItem("kaneez_products");
          return saved ? JSON.parse(saved) : initialProducts;
        } catch (e) {
          console.error("Failed to parse kaneez_products:", e);
          return initialProducts;
        }
      });
      const [cart, setCart] = useState([]);
      const [selectedProduct, setSelectedProduct] = useState(null);
      const [filterCategory, setFilterCategory] = useState("All");
      const [notification, setNotification] = useState(null);
      const [cartOpen, setCartOpen] = useState(false);

      // Checkout State variables
      const [checkoutStep, setCheckoutStep] = useState("cart"); // cart, checkout
      const [checkoutMethod, setCheckoutMethod] = useState("whatsapp"); // card, cod, jazzcash_easypaisa, whatsapp
      const [customerInfo, setCustomerInfo] = useState({ name: "", phone: "", address: "", city: "", cardName: "", cardNumber: "", cardExpiry: "", cardCvv: "", transactionId: "" });
      const [isPaying, setIsPaying] = useState(false);

      const showNotif = (msg, type="success") => {
        setNotification({ msg, type });
        setTimeout(() => setNotification(null), 3000);
      };

      const addToCart = (product, size) => {
        setCart(prev => {
          const existing = prev.find(i => i.id === product.id && i.size === size);
          if (existing) return prev.map(i => i.id === product.id && i.size === size ? {...i, qty: i.qty+1} : i);
          return [...prev, { ...product, size, qty: 1 }];
        });
        showNotif(`${product.name} added to cart! 🛍️`);
      };

      const removeFromCart = (id, size) => setCart(prev => prev.filter(i => !(i.id === id && i.size === size)));
      const cartTotal = cart.reduce((s, i) => s + i.price * i.qty, 0);
      const cartCount = cart.reduce((s, i) => s + i.qty, 0);

      // Listen for changes in localStorage from the Admin page
      useEffect(() => {
        const handleStorage = (e) => {
          if (e.key === "kaneez_products") {
            try {
              setProducts(e.newValue ? JSON.parse(e.newValue) : initialProducts);
            } catch (err) {
              console.error("Failed to parse storage update for products:", err);
            }
          }
        };
        window.addEventListener("storage", handleStorage);
        return () => window.removeEventListener("storage", handleStorage);
      }, []);

      const categories = ["All", "Girls", "Boys", "Infants"];
      const filtered = filterCategory === "All" ? products : products.filter(p => p.category === filterCategory);
      const featured = products.filter(p => p.featured);

      // Order confirmation / Checkout execution handler
      const handlePlaceOrder = (e) => {
        e.preventDefault();

        // Validations based on selected checkout method
        if (checkoutMethod === "whatsapp") {
          if (!customerInfo.name || !customerInfo.phone || !customerInfo.address) {
            return showNotif("Please fill in Name, Phone, and Address!", "error");
          }
        } else if (checkoutMethod === "cod") {
          if (!customerInfo.name || !customerInfo.phone || !customerInfo.address || !customerInfo.city) {
            return showNotif("Please fill in Name, Phone, Address, and City!", "error");
          }
        } else if (checkoutMethod === "jazzcash_easypaisa") {
          if (!customerInfo.phone || !customerInfo.transactionId || !customerInfo.address) {
            return showNotif("Please fill in Sender Number, TID, and Address!", "error");
          }
        } else if (checkoutMethod === "card") {
          if (!customerInfo.cardName || !customerInfo.cardNumber || !customerInfo.cardExpiry || !customerInfo.cardCvv || !customerInfo.address) {
            return showNotif("Please fill in Name on Card, Card Number, Expiry, CVV, and Address!", "error");
          }
        }

        const executeOrder = () => {
          const newOrder = {
            id: "KC-" + Math.floor(100000 + Math.random() * 900000),
            date: new Date().toLocaleString("en-US", { hour12: true }),
            items: cart.map(item => ({ id: item.id, name: item.name, size: item.size, qty: item.qty, price: item.price, image: item.image })),
            total: cartTotal,
            method: checkoutMethod === "card" ? "By Card" : checkoutMethod === "cod" ? "Cash on Delivery" : checkoutMethod === "jazzcash_easypaisa" ? "JazzCash / EasyPaisa" : "WhatsApp Order",
            customer: {
              name: customerInfo.name || customerInfo.cardName || "Anonymous",
              phone: customerInfo.phone || "",
              address: customerInfo.address || "",
              city: customerInfo.city || "",
              transactionId: customerInfo.transactionId || ""
            },
            status: "Pending"
          };

          // Save order database records to localStorage (so admin.html can list them)
          let orders = [];
          try {
            const existingOrders = safeLocalStorage.getItem("kaneez_orders");
            orders = existingOrders ? JSON.parse(existingOrders) : [];
          } catch (e) {
            console.error("Failed to parse existing orders:", e);
          }
          orders.unshift(newOrder);
          safeLocalStorage.setItem("kaneez_orders", JSON.stringify(orders));

          // If method is WhatsApp, launch pre-filled WhatsApp message
          if (checkoutMethod === "whatsapp") {
            const itemDetails = cart.map(i => `• ${i.name} (Size: ${i.size}) x ${i.qty} = Rs. ${(i.price * i.qty).toLocaleString()}`).join("\n");
            const waMessage = `Salam Kaneez Creations! I want to place an order:
---------------------------------
${itemDetails}
---------------------------------
Total: Rs. ${cartTotal.toLocaleString()}
Payment Method: WhatsApp Order
Name: ${customerInfo.name}
Phone: ${customerInfo.phone}
Address: ${customerInfo.address}`;
            window.open(`https://wa.me/923127228822?text=${encodeURIComponent(waMessage)}`, "_blank");
          }

          showNotif("Order placed successfully! 🎉");
          setCart([]);
          setCheckoutStep("cart");
          setCartOpen(false);
          // Reset fields
          setCustomerInfo({ name: "", phone: "", address: "", city: "", cardName: "", cardNumber: "", cardExpiry: "", cardCvv: "", transactionId: "" });
        };

        if (checkoutMethod === "card") {
          setIsPaying(true);
          setTimeout(() => {
            setIsPaying(false);
            executeOrder();
          }, 2000);
        } else {
          executeOrder();
        }
      };

      // ─── STYLES ───
      const s = {
        page: { fontFamily: "'Playfair Display', Georgia, serif", minHeight: "100vh", background: "#fff9f5", color: "#2a1a0e", margin: 0 },
        // HEADER
        header: { background: "linear-gradient(135deg, #c0392b 0%, #8e1a0e 100%)", padding: "0", boxShadow: "0 4px 20px rgba(192,57,43,0.3)", position: "sticky", top: 0, zIndex: 100 },
        headerInner: { maxWidth: 1200, margin: "0 auto", padding: "12px 24px", display: "flex", alignItems: "center", justifyContent: "space-between" },
        logo: { display: "flex", flexDirection: "column", cursor: "pointer" },

        logoSub: { color: "#ffcdd2", fontSize: 11, letterSpacing: 4, textTransform: "uppercase" },
        nav: { display: "flex", gap: 8, alignItems: "center" },
        navBtn: (active) => ({ background: active ? "rgba(255,255,255,0.25)" : "transparent", border: "1px solid rgba(255,255,255,0.3)", color: "#fff", padding: "6px 16px", borderRadius: 20, cursor: "pointer", fontSize: 13, fontFamily: "inherit", transition: "all 0.2s" }),
        cartBtn: { position: "relative", background: "#fff", border: "none", borderRadius: 20, padding: "6px 16px", cursor: "pointer", color: "#c0392b", fontWeight: 700, fontSize: 13, fontFamily: "inherit", display: "flex", alignItems: "center", gap: 6 },
        cartBadge: { background: "#c0392b", color: "#fff", borderRadius: "50%", width: 18, height: 18, fontSize: 10, display: "flex", alignItems: "center", justifyContent: "center", position: "absolute", top: -6, right: -6 },
        // HERO
        hero: { background: "linear-gradient(135deg, #fff9f5 0%, #fce4ec 50%, #fff3e0 100%)", padding: "60px 24px 40px", textAlign: "center", position: "relative", overflow: "hidden" },

        // PRODUCT DETAIL
        detailWrap: { maxWidth: 900, margin: "0 auto", padding: "32px 24px", display: "grid", gridTemplateColumns: "1fr 1fr", gap: 40 },
        detailImg: { background: "linear-gradient(135deg, #fce4ec, #fff3e0)", borderRadius: 20, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 120, minHeight: 280 },

        notif: (type) => ({ position: "fixed", top: 80, right: 24, background: type === "error" ? "#c62828" : "#2e7d32", color: "#fff", padding: "12px 22px", borderRadius: 12, zIndex: 300, fontSize: 14, fontWeight: 600, boxShadow: "0 4px 16px rgba(0,0,0,0.2)", maxWidth: 300 }),

        footerSub: { color: "#8d6e63", fontSize: 12, letterSpacing: 3, textTransform: "uppercase", marginBottom: 16 },

        footerLink: { color: "#d7ccc8", fontSize: 13, cursor: "pointer", textDecoration: "none" },
        footerCopy: { color: "#6d4c41", fontSize: 11, marginTop: 12 },
        // CHECKOUT EXTRA STYLES
        grid2x2: { display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8, marginBottom: 16 },
        methodBtn: (selected) => ({
          background: selected ? "#fff3f3" : "#fff",
          border: selected ? "2px solid #c0392b" : "2px solid #fce4ec",
          borderRadius: 12,
          padding: "12px 6px",
          cursor: "pointer",
          display: "flex",
          flexDirection: "column",
          alignItems: "center",
          gap: 6,
          fontSize: 11,
          fontFamily: "inherit",
          fontWeight: 700,
          color: selected ? "#c0392b" : "#7b5a4a",
          transition: "all 0.2s"
        }),
        checkoutLabel: { display: "block", fontSize: 11, fontWeight: 700, color: "#8e1a0e", marginBottom: 4, letterSpacing: 0.5, textTransform: "uppercase" },
        formGrid: { display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 },
        input: { width: "100%", padding: "12px 16px", border: "2px solid #fce4ec", borderRadius: 12, fontSize: 14, fontFamily: "inherit", background: "#fff", outline: "none", boxSizing: "border-box", color: "#2a1a0e" }
      };

      const renderProductImage = (image, name) => {
        if (image && (image.startsWith('data') || image.startsWith('http') || image.includes('/'))) {
          return <img src={image} alt={name} style={{ width: "100%", height: "100%", objectFit: "cover" }} />;
        }
        return image;
      };

      const [selectedSize, setSelectedSize] = useState(null);

      // ─── COMPONENTS ───

      const Notification = () => notification && (
        <div style={s.notif(notification.type)}>{notification.msg}</div>
      );

      const Header = () => (
        <header style={s.header}>
          <div style={s.headerInner}>
            <div style={s.logo} onClick={() => setView("home")}>
              <span style={s.logoMain}>Kaneez Creations</span>
              <span style={s.logoSub}>✦ Kidz Wear ✦</span>
            </div>
            <nav style={s.nav}>
              <button style={s.navBtn(view==="home")} onClick={() => setView("home")}>Home</button>
              <button style={s.navBtn(view==="shop" || view==="product")} onClick={() => setView("shop")}>Shop</button>
              <button style={s.cartBtn} onClick={() => setCartOpen(true)}>
                🛍️ Cart
                {cartCount > 0 && <span style={s.cartBadge}>{cartCount}</span>}
              </button>
            </nav>
          </div>
        </header>
      );

      const Footer = () => (
        <footer style={s.footer}>
          <div style={s.footerTitle}>Kaneez Creations</div>
          <div style={s.footerSub}>✦ Kidz Wear ✦</div>
          <p style={{ color: "#a1887f", fontSize: 13, marginBottom: 16 }}>
            Premium quality children's clothing for every occasion.<br/>
            Proudly serving families with love & style. 💕
          </p>
          <div style={s.footerLinks}>
            <span style={s.footerLink} onClick={() => setView("home")}>Home</span>
            <span style={s.footerLink} onClick={() => setView("shop")}>Shop</span>
            <span style={s.footerLink}>Contact</span>
            <span style={s.footerLink}>About Us</span>
          </div>
          <div style={s.footerCopy}>© 2024 Kaneez Creations – All Rights Reserved</div>
        </footer>
      );

      const CartDrawer = () => (
        <>
          <div style={s.overlay} onClick={() => setCartOpen(false)} />
          <div style={s.drawer}>
            <div style={s.drawerHead}>
              <span style={s.drawerTitle}>
                {checkoutStep === "cart" ? `🛍️ Your Cart (${cartCount})` : "💳 Checkout Form"}
              </span>
              <button style={s.closeBtn} onClick={() => { setCartOpen(false); setCheckoutStep("cart"); }}>✕</button>
            </div>
            
            {checkoutStep === "cart" ? (
              // STEP 1: CART LIST
              <>
                <div style={{ flex: 1, overflowY: "auto" }}>
                  {cart.length === 0 ? (
                    <div style={{ padding: 40, textAlign: "center", color: "#a1887f" }}>
                      <div style={{ fontSize: 48, marginBottom: 12 }}>🧺</div>
                      <div style={{ fontSize: 15 }}>Your cart is empty</div>
                    </div>
                  ) : cart.map(item => (
                    <div key={item.id+item.size} style={s.cartItem}>
                      <div style={s.cartItemImg}>{renderProductImage(item.image, item.name)}</div>
                      <div style={{ flex: 1 }}>
                        <div style={{ fontWeight: 700, fontSize: 14 }}>{item.name}</div>
                        <div style={{ fontSize: 12, color: "#a1887f" }}>Size: {item.size} × {item.qty}</div>
                        <div style={{ fontWeight: 700, color: "#c0392b", fontSize: 14 }}>Rs. {(item.price * item.qty).toLocaleString()}</div>
                      </div>
                      <button onClick={() => removeFromCart(item.id, item.size)} style={{ background: "#fce4ec", border: "none", borderRadius: 6, padding: "4px 8px", cursor: "pointer", color: "#c0392b", fontSize: 14 }}>✕</button>
                    </div>
                  ))}
                </div>
                {cart.length > 0 && (
                  <div style={{ borderTop: "2px solid #fce4ec", padding: "16px 24px" }}>
                    <div style={{ display: "flex", justifyContent: "space-between", fontWeight: 700, fontSize: 16, marginBottom: 8 }}>
                      <span>Total:</span>
                      <span style={{ color: "#c0392b" }}>Rs. {cartTotal.toLocaleString()}</span>
                    </div>
                    <button style={s.checkoutBtn} onClick={() => setCheckoutStep("checkout")}>
                      Proceed to Checkout 💳
                    </button>
                  </div>
                )}
              </>
            ) : (
              // STEP 2: CHECKOUT
              <div style={{ flex: 1, display: "flex", flexDirection: "column", overflow: "hidden" }}>
                <div style={{ padding: "12px 24px", borderBottom: "1px solid #fce4ec", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                  <button style={{ background: "none", border: "none", color: "#c0392b", fontWeight: 600, cursor: "pointer", fontSize: 14, fontFamily: "inherit" }} onClick={() => setCheckoutStep("cart")}>
                    ← Back to Cart
                  </button>
                  <span style={{ fontSize: 14, fontWeight: 700, color: "#7b5a4a" }}>
                    Total: <strong style={{ color: "#c0392b" }}>Rs. {cartTotal.toLocaleString()}</strong>
                  </span>
                </div>
                
                <form onSubmit={handlePlaceOrder} style={{ flex: 1, overflowY: "auto", padding: "20px 24px" }}>
                  <div style={{ fontSize: 12, fontWeight: 700, color: "#8e1a0e", letterSpacing: 1, textTransform: "uppercase", marginBottom: 10 }}>
                    Select Payment Method:
                  </div>
                  
                  {/* Payment Grid */}
                  <div style={s.grid2x2}>
                    <button type="button" style={s.methodBtn(checkoutMethod === "card")} onClick={() => setCheckoutMethod("card")}>
                      <span style={{ fontSize: 22, marginBottom: 4 }}>💳</span>
                      <span>By Card</span>
                    </button>
                    <button type="button" style={s.methodBtn(checkoutMethod === "cod")} onClick={() => setCheckoutMethod("cod")}>
                      <span style={{ fontSize: 22, marginBottom: 4 }}>💵</span>
                      <span>Cash on Delivery</span>
                    </button>
                    <button type="button" style={s.methodBtn(checkoutMethod === "jazzcash_easypaisa")} onClick={() => setCheckoutMethod("jazzcash_easypaisa")}>
                      <span style={{ fontSize: 22, marginBottom: 4 }}>📱</span>
                      <span>JazzCash / EasyPaisa</span>
                    </button>
                    <button type="button" style={s.methodBtn(checkoutMethod === "whatsapp")} onClick={() => setCheckoutMethod("whatsapp")}>
                      <span style={{ fontSize: 22, marginBottom: 4 }}>💬</span>
                      <span>WhatsApp Order</span>
                    </button>
                  </div>

                  {/* FORM FIELDS BASED ON SELECTION */}
                  {checkoutMethod === "whatsapp" && (
                    <div>
                      <p style={{ fontSize: 13, color: "#7b5a4a", marginBottom: 14, lineHeight: 1.5, background: "#fff3f3", padding: "12px", borderRadius: 8, borderLeft: "4px solid #c0392b" }}>
                        This will format your order and open WhatsApp to send directly to <strong>03127228822</strong>.
                      </p>
                      <div style={{ marginBottom: 12 }}>
                        <label style={s.checkoutLabel}>Your Name *</label>
                        <input style={s.input} value={customerInfo.name} onChange={e => setCustomerInfo({...customerInfo, name: e.target.value})} placeholder="Ali Khan" required />
                      </div>
                      <div style={{ marginBottom: 12 }}>
                        <label style={s.checkoutLabel}>Phone Number *</label>
                        <input style={s.input} value={customerInfo.phone} onChange={e => setCustomerInfo({...customerInfo, phone: e.target.value})} placeholder="03001234567" required />
                      </div>
                      <div style={{ marginBottom: 12 }}>
                        <label style={s.checkoutLabel}>Delivery Address *</label>
                        <textarea style={{ ...s.input, minHeight: 60 }} value={customerInfo.address} onChange={e => setCustomerInfo({...customerInfo, address: e.target.value})} placeholder="Full address details" required />
                      </div>
                    </div>
                  )}

                  {checkoutMethod === "cod" && (
                    <div>
                      <div style={{ marginBottom: 12 }}>
                        <label style={s.checkoutLabel}>Full Name *</label>
                        <input style={s.input} value={customerInfo.name} onChange={e => setCustomerInfo({...customerInfo, name: e.target.value})} placeholder="Ali Khan" required />
                      </div>
                      <div style={{ marginBottom: 12 }}>
                        <label style={s.checkoutLabel}>Phone Number *</label>
                        <input style={s.input} value={customerInfo.phone} onChange={e => setCustomerInfo({...customerInfo, phone: e.target.value})} placeholder="03001234567" required />
                      </div>
                      <div style={{ marginBottom: 12 }}>
                        <label style={s.checkoutLabel}>City *</label>
                        <input style={s.input} value={customerInfo.city} onChange={e => setCustomerInfo({...customerInfo, city: e.target.value})} placeholder="Lahore" required />
                      </div>
                      <div style={{ marginBottom: 12 }}>
                        <label style={s.checkoutLabel}>Delivery Address *</label>
                        <textarea style={{ ...s.input, minHeight: 60 }} value={customerInfo.address} onChange={e => setCustomerInfo({...customerInfo, address: e.target.value})} placeholder="Street details, area, landmarks" required />
                      </div>
                    </div>
                  )}

                  {checkoutMethod === "jazzcash_easypaisa" && (
                    <div>
                      <div style={{ fontSize: 13, color: "#2e6a8a", marginBottom: 14, lineHeight: 1.6, background: "#eef9ff", padding: 12, borderRadius: 10, border: "1px solid #b3e5fc", borderLeft: "4px solid #0288d1" }}>
                        Send payment of <strong>Rs. {cartTotal.toLocaleString()}</strong> to:<br/>
                        📱 <strong>EasyPaisa / JazzCash No:</strong> 03127228822<br/>
                        👤 <strong>Account Name:</strong> Kaneez Creations
                      </div>
                      <div style={{ marginBottom: 12 }}>
                        <label style={s.checkoutLabel}>Sender Account / Phone No. *</label>
                        <input style={s.input} value={customerInfo.phone} onChange={e => setCustomerInfo({...customerInfo, phone: e.target.value})} placeholder="e.g. 03451234567" required />
                      </div>
                      <div style={{ marginBottom: 12 }}>
                        <label style={s.checkoutLabel}>Transaction ID (TID) *</label>
                        <input style={s.input} value={customerInfo.transactionId} onChange={e => setCustomerInfo({...customerInfo, transactionId: e.target.value})} placeholder="e.g. 10243456782" required />
                      </div>
                      <div style={{ marginBottom: 12 }}>
                        <label style={s.checkoutLabel}>Delivery Address *</label>
                        <textarea style={{ ...s.input, minHeight: 60 }} value={customerInfo.address} onChange={e => setCustomerInfo({...customerInfo, address: e.target.value})} placeholder="Full shipping address" required />
                      </div>
                    </div>
                  )}

                  {checkoutMethod === "card" && (
                    <div>
                      <div style={{ marginBottom: 12 }}>
                        <label style={s.checkoutLabel}>Cardholder Name *</label>
                        <input style={s.input} value={customerInfo.cardName} onChange={e => setCustomerInfo({...customerInfo, cardName: e.target.value})} placeholder="Ali Khan" required />
                      </div>
                      <div style={{ marginBottom: 12 }}>
                        <label style={s.checkoutLabel}>Card Number *</label>
                        <input style={s.input} value={customerInfo.cardNumber} onChange={e => setCustomerInfo({...customerInfo, cardNumber: e.target.value})} placeholder="4000 1234 5678 9010" required />
                      </div>
                      <div style={s.formGrid}>
                        <div style={{ marginBottom: 12 }}>
                          <label style={s.checkoutLabel}>Expiry Date *</label>
                          <input style={s.input} value={customerInfo.cardExpiry} onChange={e => setCustomerInfo({...customerInfo, cardExpiry: e.target.value})} placeholder="MM/YY" required />
                        </div>
                        <div style={{ marginBottom: 12 }}>
                          <label style={s.checkoutLabel}>CVV *</label>
                          <input style={s.input} type="password" value={customerInfo.cardCvv} onChange={e => setCustomerInfo({...customerInfo, cardCvv: e.target.value})} placeholder="123" maxLength="4" required />
                        </div>
                      </div>
                      <div style={{ marginBottom: 12 }}>
                        <label style={s.checkoutLabel}>Delivery Address *</label>
                        <textarea style={{ ...s.input, minHeight: 60 }} value={customerInfo.address} onChange={e => setCustomerInfo({...customerInfo, address: e.target.value})} placeholder="Full shipping address" required />
                      </div>
                    </div>
                  )}

                  <button 
                    type="submit" 
                    disabled={isPaying} 
                    style={{ ...s.checkoutBtn, margin: "16px 0 0 0", opacity: isPaying ? 0.7 : 1, position: "relative" }}
                  >
                    {isPaying ? "Processing Payment... 💳" : checkoutMethod === "whatsapp" ? "💬 Send Order via WhatsApp" : "Confirm Order & Purchase 🎉"}
                  </button>
                </form>
              </div>
            )}
          </div>
        </>
      );

      // ─── VIEWS ───

      const HomeView = () => (
        <div>
          {/* Hero */}
          <div style={s.hero}>
            <div style={{ fontSize: 56, marginBottom: 12 }}>👗✨👶</div>
            <h1 style={s.heroTitle}>Kaneez Creations</h1>
            <div style={s.heroSub}>✦ Kidz Wear Collection ✦</div>
            <p style={s.heroDesc}>Adorable, premium quality clothing for your little ones. From everyday casuals to festive wear — dressed with love.</p>
            <button style={s.heroBtn} onClick={() => setView("shop")}>Explore Collection →</button>
            <div style={{ display: "flex", justifyContent: "center", gap: 32, marginTop: 36, flexWrap: "wrap" }}>
              {[["👗","Girls Wear"],["👕","Boys Wear"],["🍼","Infant Wear"],["🎀","Party Wear"]].map(([icon, label]) => (
                <div key={label} style={{ textAlign: "center" }}>
                  <div style={{ fontSize: 30, marginBottom: 4 }}>{icon}</div>
                  <div style={{ fontSize: 12, color: "#8e1a0e", fontWeight: 700, letterSpacing: 1, textTransform: "uppercase" }}>{label}</div>
                </div>
              ))}
            </div>
          </div>

          {/* Featured */}
          <div style={s.section}>
            <div style={s.sectionTitle}>⭐ Featured Collection</div>
            <div style={s.sectionLine} />
            <div style={s.grid}>
              {featured.map(p => (
                <div key={p.id} style={s.card} onClick={() => { setSelectedProduct(p); setSelectedSize(p.size[0]); setView("product"); }}
                  onMouseEnter={e => { e.currentTarget.style.transform = "translateY(-4px)"; e.currentTarget.style.boxShadow = "0 8px 28px rgba(192,57,43,0.16)"; }}
                  onMouseLeave={e => { e.currentTarget.style.transform = ""; e.currentTarget.style.boxShadow = ""; }}>
                  <div style={s.cardImg}>{renderProductImage(p.image, p.name)}</div>
                  <div style={s.cardBody}>
                    <div style={s.cardCat}>{p.category}</div>
                    <div style={s.cardName}>{p.name}</div>
                    <div style={s.cardPrice}>Rs. {p.price.toLocaleString()}</div>
                    <div style={s.cardStock(p.stock)}>{p.stock > 0 ? `✓ In Stock (${p.stock})` : "✗ Out of Stock"}</div>
                  </div>
                </div>
              ))}
            </div>
          </div>

          {/* Banner */}
          <div style={{ background: "linear-gradient(135deg, #c0392b, #8e1a0e)", padding: "36px 24px", textAlign: "center", color: "#fff" }}>
            <div style={{ fontSize: 26, fontWeight: 700, marginBottom: 8 }}>🎉 Eid Special Collection Now Available!</div>
            <div style={{ opacity: 0.85, marginBottom: 20, fontSize: 14 }}>Festive outfits for boys & girls — limited stock</div>
            <button style={{ background: "#fff", color: "#c0392b", border: "none", padding: "12px 30px", borderRadius: 25, fontSize: 14, cursor: "pointer", fontFamily: "inherit", fontWeight: 700 }} onClick={() => setView("shop")}>Shop Now</button>
          </div>

          <Footer />
        </div>
      );

      const ShopView = () => (
        <div style={s.section}>
          <div style={s.sectionTitle}>🛍️ All Products</div>
          <div style={s.sectionLine} />
          <div style={s.filterRow}>
            {categories.map(c => (
              <button key={c} style={s.filterBtn(filterCategory===c)} onClick={() => setFilterCategory(c)}>{c}</button>
            ))}
          </div>
          <div style={s.grid}>
            {filtered.map(p => (
              <div key={p.id} style={s.card} onClick={() => { setSelectedProduct(p); setSelectedSize(p.size[0]); setView("product"); }}
                onMouseEnter={e => { e.currentTarget.style.transform = "translateY(-4px)"; e.currentTarget.style.boxShadow = "0 8px 28px rgba(192,57,43,0.16)"; }}
                onMouseLeave={e => { e.currentTarget.style.transform = ""; e.currentTarget.style.boxShadow = ""; }}>
                <div style={s.cardImg}>{renderProductImage(p.image, p.name)}</div>
                <div style={s.cardBody}>
                  <div style={s.cardCat}>{p.category}</div>
                  <div style={s.cardName}>{p.name}</div>
                  <div style={s.cardPrice}>Rs. {p.price.toLocaleString()}</div>
                  <div style={s.cardStock(p.stock)}>{p.stock > 0 ? `✓ In Stock (${p.stock})` : "✗ Out of Stock"}</div>
                </div>
              </div>
            ))}
          </div>
          {filtered.length === 0 && <div style={{ textAlign: "center", color: "#a1887f", padding: 40, fontSize: 16 }}>No products found in this category.</div>}
          <Footer />
        </div>
      );

      const ProductView = () => {
        const p = selectedProduct;
        if (!p) return null;
        return (
          <div>
            <div style={{ maxWidth: 900, margin: "0 auto", padding: "24px 24px 0" }}>
              <button style={s.backBtn} onClick={() => setView("shop")}>← Back to Shop</button>
            </div>
            <div style={{ ...s.detailWrap, gridTemplateColumns: window.innerWidth < 600 ? "1fr" : "1fr 1fr" }}>
              <div style={s.detailImg}>{renderProductImage(p.image, p.name)}</div>
              <div>
                <div style={s.detailCat}>{p.category}</div>
                <div style={s.detailName}>{p.name}</div>
                <div style={s.detailPrice}>Rs. {p.price.toLocaleString()}</div>
                <div style={{ fontSize: 14, color: "#7b5a4a", lineHeight: 1.7, marginBottom: 20 }}>{p.description}</div>
                <div style={{ marginBottom: 12 }}>
                  <div style={{ fontSize: 12, fontWeight: 700, color: "#8e1a0e", letterSpacing: 1, marginBottom: 8, textTransform: "uppercase" }}>Select Size:</div>
                  {p.size.map(sz => (
                    <button key={sz} style={s.sizeBtn(selectedSize===sz)} onClick={() => setSelectedSize(sz)}>{sz}</button>
                  ))}
                </div>
                <div style={s.cardStock(p.stock)}>{p.stock > 0 ? `✓ In Stock — ${p.stock} pieces available` : "✗ Out of Stock"}</div>
                {p.stock > 0 && (
                  <button style={s.addCartBtn} onClick={() => { addToCart(p, selectedSize); setCartOpen(true); }}>
                    🛍️ Add to Cart
                  </button>
                )}
              </div>
            </div>
            <Footer />
          </div>
        );
      };

      return (
        <div style={s.page}>
          {Header()}
          <Notification />
          {cartOpen && CartDrawer()}
          {view === "home" && HomeView()}
          {view === "shop" && ShopView()}
          {view === "product" && ProductView()}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<KaneezCreations />);
  </script>
</body>
</html>
