<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kaneez Creations - Admin Panel</title>
  
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Inter:wght@100..900&display=swap" rel="stylesheet">
  
  <!-- React and ReactDOM CDNs (Production versions) using jsDelivr for superior reliability -->
  <script src="https://cdn.jsdelivr.net/npm/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  
  <!-- Babel Standalone for in-browser JSX compilation using jsDelivr -->
  <script src="https://cdn.jsdelivr.net/npm/@babel/standalone@7/babel.min.js"></script>

  <!-- Global Error Logger/Overlay -->
  <div id="error-boundary-overlay" style="display:none; position:fixed; inset:0; background:rgba(42,26,14,0.95); color:#ff8a80; padding:30px; font-family:monospace; z-index:99999; overflow-y:auto; font-size:14px; line-height:1.5; border:5px solid #c0392b;">
    <h2 style="color:#ff5252; margin-top:0; border-bottom:2px solid #ff5252; padding-bottom:10px; font-family:sans-serif;">⚠️ Kaneez Creations - Admin Panel Loading or Script Error</h2>
    <p style="color:#fff; font-family:sans-serif;">An unexpected error occurred while loading the admin application. See details below:</p>
    <pre id="error-boundary-details" style="background:#212121; padding:15px; border-radius:8px; border:1px solid #424242; white-space:pre-wrap; word-break:break-all; color:#ff8a80;"></pre>
    <button onclick="window.location.reload()" style="background:#c0392b; color:#fff; border:none; padding:10px 20px; border-radius:4px; font-weight:bold; cursor:pointer; margin-top:15px; font-family:sans-serif; transition: background 0.2s;">Reload Page</button>
  </div>
  <script>
    function showGlobalError(message, source, lineno, colno, error) {
      const overlay = document.getElementById('error-boundary-overlay');
      const details = document.getElementById('error-boundary-details');
      if (overlay && details) {
        let errText = `Error: ${message}\n`;
        if (source) errText += `Source: ${source}\n`;
        if (lineno) errText += `Line: ${lineno}, Col: ${colno}\n`;
        if (error && error.stack) {
          errText += `Stack: ${error.stack}\n`;
        }
        details.textContent = errText;
        overlay.style.display = 'block';
      }
    }
    window.onerror = function(message, source, lineno, colno, error) {
      showGlobalError(message, source, lineno, colno, error);
      return false;
    };
    window.addEventListener('unhandledrejection', function(event) {
      showGlobalError(event.reason ? event.reason.message : 'Unhandled Promise Rejection', null, null, null, event.reason);
    });
  </script>

  <style>
    /* Reset & custom styling for admin layout */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      margin: 0;
      font-family: 'Playfair Display', Georgia, serif;
      background: #fff9f5;
      color: #2a1a0e;
      overflow-x: hidden;
    }
    
    /* Elegant scrollbars */
    ::-webkit-scrollbar {
      width: 8px;
    }
    ::-webkit-scrollbar-track {
      background: #fff9f5;
    }
    ::-webkit-scrollbar-thumb {
      background: #c0392b;
      border-radius: 4px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: #8e1a0e;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    const initialProducts = [
      { id: 1, name: "Floral Frock", category: "Girls", size: ["2-3Y","4-5Y","6-7Y"], price: 1200, stock: 15, image: "👗", description: "Beautiful floral printed frock with lace detailing", featured: true },
      { id: 2, name: "Denim Dungaree", category: "Boys", size: ["1-2Y","3-4Y","5-6Y"], price: 1500, stock: 10, image: "👖", description: "Comfortable denim dungaree perfect for playtime", featured: true },
      { id: 3, name: "Embroidered Suit", category: "Girls", size: ["4-5Y","6-7Y","8-9Y"], price: 2200, stock: 8, image: "👘", description: "Elegant embroidered suit for special occasions", featured: true },
      { id: 4, name: "T-Shirt & Shorts Set", category: "Boys", size: ["1-2Y","2-3Y","3-4Y"], price: 950, stock: 20, image: "👕", description: "Casual cotton t-shirt and shorts combo", featured: false },
      { id: 5, name: "Party Frock", category: "Girls", size: ["3-4Y","5-6Y","7-8Y"], price: 2800, stock: 5, image: "🎀", description: "Gorgeous party frock with ribbon and net layers", featured: true },
      { id: 6, name: "Kameez Shalwar", category: "Boys", size: ["2-3Y","4-5Y","6-7Y","8-9Y"], price: 1800, stock: 12, image: "🧥", description: "Traditional Pakistani kameez shalwar in premium fabric", featured: false },
      { id: 7, name: "Baby Romper", category: "Infants", size: ["0-3M","3-6M","6-9M","9-12M"], price: 750, stock: 25, image: "🍼", description: "Soft cotton romper for newborns and infants", featured: true },
      { id: 8, name: "Lehenga Choli", category: "Girls", size: ["3-4Y","5-6Y","7-8Y"], price: 3500, stock: 6, image: "✨", description: "Stunning lehenga choli for weddings and festivals", featured: false },
    ];

    const ADMIN_PASS = "kaneez123";

    // Safe localStorage wrapper to prevent crashes when running under file:// or with disabled cookies
    const safeLocalStorage = {
      getItem(key) {
        try {
          return localStorage.getItem(key);
        } catch (e) {
          console.warn("localStorage.getItem is blocked or unavailable:", e);
          return null;
        }
      },
      setItem(key, value) {
        try {
          localStorage.setItem(key, value);
        } catch (e) {
          console.warn("localStorage.setItem is blocked or unavailable:", e);
        }
      }
    };

    function KaneezAdmin() {
      const [products, setProducts] = useState(() => {
        try {
          const saved = safeLocalStorage.getItem("kaneez_products");
          return saved ? JSON.parse(saved) : initialProducts;
        } catch (e) {
          console.error("Failed to parse products from localStorage:", e);
          return initialProducts;
        }
      });
      const [orders, setOrders] = useState(() => {
        try {
          const saved = safeLocalStorage.getItem("kaneez_orders");
          return saved ? JSON.parse(saved) : [];
        } catch (e) {
          console.error("Failed to parse orders from localStorage:", e);
          return [];
        }
      });
      const [adminAuth, setAdminAuth] = useState(false);
      const [adminPass, setAdminPass] = useState("");
      const [adminView, setAdminView] = useState("dashboard"); // dashboard, products, add, lowstock, orders
      const [editProduct, setEditProduct] = useState(null);
      const [notification, setNotification] = useState(null);
      const [newProduct, setNewProduct] = useState({ name:"", category:"Girls", size:"", price:"", stock:"", image:"", description:"", featured:false });
      const [selectedOrderDetails, setSelectedOrderDetails] = useState(null); // Modal popup state

      // Persist databases in localStorage
      useEffect(() => {
        try {
          safeLocalStorage.setItem("kaneez_products", JSON.stringify(products));
        } catch (e) {
          console.error("Failed to save products:", e);
        }
      }, [products]);

      useEffect(() => {
        try {
          safeLocalStorage.setItem("kaneez_orders", JSON.stringify(orders));
        } catch (e) {
          console.error("Failed to save orders:", e);
        }
      }, [orders]);

      // Realtime listeners for changes in store tab
      useEffect(() => {
        const handleStorage = (e) => {
          try {
            if (e.key === "kaneez_products") {
              setProducts(e.newValue ? JSON.parse(e.newValue) : initialProducts);
            }
            if (e.key === "kaneez_orders") {
              setOrders(e.newValue ? JSON.parse(e.newValue) : []);
            }
          } catch (err) {
            console.error("Failed to sync storage update:", err);
          }
        };
        window.addEventListener("storage", handleStorage);
        return () => window.removeEventListener("storage", handleStorage);
      }, []);

      const showNotif = (msg, type="success") => {
        setNotification({ msg, type });
        setTimeout(() => setNotification(null), 3000);
      };

      const handleAdminLogin = () => {
        if (adminPass === ADMIN_PASS) {
          setAdminAuth(true);
          showNotif("Welcome, Admin! 👑");
        } else {
          showNotif("Wrong password!", "error");
        }
      };

      // Product actions
      const handleDeleteProduct = (id) => {
        if (confirm("Are you sure you want to delete this product?")) {
          setProducts(prev => prev.filter(p => p.id !== id));
          showNotif("Product deleted successfully.", "error");
        }
      };

      const handleSaveProduct = () => {
        if (!newProduct.name || !newProduct.price || !newProduct.stock) {
          return showNotif("Fill all required fields!", "error");
        }
        const sizes = newProduct.size.split(",").map(s => s.trim()).filter(Boolean);
        
        if (editProduct) {
          setProducts(prev => prev.map(p => p.id === editProduct.id ? { ...newProduct, id: editProduct.id, size: sizes, price: +newProduct.price, stock: +newProduct.stock } : p));
          showNotif("Product updated! ✅");
        } else {
          setProducts(prev => [...prev, { ...newProduct, id: Date.now(), size: sizes, price: +newProduct.price, stock: +newProduct.stock }]);
          showNotif("New product added! 🎉");
        }

        setNewProduct({ name:"", category:"Girls", size:"", price:"", stock:"", image:"👗", description:"", featured:false });
        setEditProduct(null);
        setAdminView("products");
      };

        const handleImageUpload = (e) => {
          const file = e.target.files[0];
          if (file) {
            const reader = new FileReader();
            reader.onloadend = () => {
              setNewProduct(prev => ({ ...prev, image: reader.result }));
            };
            reader.readAsDataURL(file);
          }
        };

        const startEdit = (p) => {
        setEditProduct(p);
        setNewProduct({ ...p, size: p.size.join(", "), price: String(p.price), stock: String(p.stock) });
        setAdminView("add");
      };

      // Order actions
      const handleUpdateOrderStatus = (orderId, status) => {
        setOrders(prev => prev.map(o => o.id === orderId ? { ...o, status } : o));
        showNotif(`Order status updated to ${status}!`);
      };

      const handleDeleteOrder = (orderId) => {
        if (confirm("Are you sure you want to delete this order record?")) {
          setOrders(prev => prev.filter(o => o.id !== orderId));
          showNotif("Order record deleted.", "error");
        }
      };

      // Calculations
      const totalStock = products.reduce((s, p) => s + p.stock, 0);
      const lowStock = products.filter(p => p.stock < 5);
      const totalValue = products.reduce((s, p) => s + p.price * p.stock, 0);
      const totalOrders = orders.length;
      const totalRevenue = orders.filter(o => o.status === "Completed").reduce((s, o) => s + o.total, 0);
      const pendingCount = orders.filter(o => o.status === "Pending").length;

      // ─── STYLES ───
      const s = {
        page: { fontFamily: "'Playfair Display', Georgia, serif", minHeight: "100vh", background: "#fff9f5", color: "#2a1a0e", margin: 0 },
        // ADMIN PANEL CONTAINER
        adminWrap: { display: "grid", gridTemplateColumns: "240px 1fr", minHeight: "calc(100vh - 60px)" },
        sidebar: { background: "#2a1a0e", padding: "28px 0", display: "flex", flexDirection: "column" },
        sideItem: (active) => ({ padding: "14px 24px", cursor: "pointer", color: active ? "#ff7043" : "#d7ccc8", fontSize: 14, fontWeight: active ? 700 : 400, background: active ? "rgba(255,112,67,0.1)" : "transparent", borderLeft: active ? "3px solid #ff7043" : "3px solid transparent", transition: "all 0.2s", fontFamily: "inherit", display: "flex", justifyContent: "space-between", alignItems: "center" }),
        adminMain: { padding: "32px", background: "#fff9f5" },
        adminTitle: { fontSize: 28, fontWeight: 700, color: "#8e1a0e", marginBottom: 24 },
        statRow: { display: "grid", gridTemplateColumns: "repeat(4, 1fr)", gap: 16, marginBottom: 32 },
        statCard: (color) => ({ background: color, borderRadius: 16, padding: "20px 22px", color: "#fff", boxShadow: "0 6px 18px rgba(0,0,0,0.06)" }),
        statNum: { fontSize: 28, fontWeight: 700 },
        statLabel: { fontSize: 12, opacity: 0.85, marginTop: 4, letterSpacing: 0.5, textTransform: "uppercase" },
        tableContainer: { background: "#fff", borderRadius: 16, overflowX: "auto", boxShadow: "0 4px 20px rgba(0,0,0,0.04)", border: "1px solid #fce4ec", marginBottom: 32 },
        table: { width: "100%", borderCollapse: "collapse", background: "#fff", minWidth: 800 },
        th: { background: "#8e1a0e", color: "#fff", padding: "14px 18px", textAlign: "left", fontSize: 12, letterSpacing: 1, textTransform: "uppercase" },
        td: { padding: "14px 18px", borderBottom: "1px solid #fce4ec", fontSize: 13, verticalAlign: "middle" },
        editBtn: { background: "#1565c0", color: "#fff", border: "none", padding: "6px 12px", borderRadius: 8, cursor: "pointer", fontSize: 12, fontFamily: "inherit", marginRight: 8, fontWeight: 600 },
        delBtn: { background: "#c62828", color: "#fff", border: "none", padding: "6px 12px", borderRadius: 8, cursor: "pointer", fontSize: 12, fontFamily: "inherit", fontWeight: 600 },
        badge: (status) => {
          let bg = "#fff3e0", color = "#e65100"; // Pending
          if (status === "Completed") { bg = "#e8f5e9"; color = "#2e7d32"; }
          else if (status === "Shipped") { bg = "#e3f2fd"; color = "#1565c0"; }
          else if (status === "Cancelled") { bg = "#ffebee"; color = "#c62828"; }
          return { background: bg, color, padding: "4px 10px", borderRadius: 12, fontSize: 11, fontWeight: 700, textTransform: "uppercase" };
        },
        formGroup: { marginBottom: 20 },
        label: { display: "block", fontSize: 12, fontWeight: 700, color: "#8e1a0e", marginBottom: 8, letterSpacing: 1, textTransform: "uppercase" },
        input: { width: "100%", padding: "12px 16px", border: "2px solid #fce4ec", borderRadius: 12, fontSize: 14, fontFamily: "inherit", background: "#fff", outline: "none", boxSizing: "border-box", color: "#2a1a0e" },
        formGrid: { display: "grid", gridTemplateColumns: "1fr 1fr", gap: 20 },
        saveBtn: { background: "linear-gradient(135deg, #c0392b, #8e1a0e)", color: "#fff", border: "none", padding: "12px 28px", borderRadius: 25, fontSize: 13, cursor: "pointer", fontFamily: "inherit", fontWeight: 700, marginTop: 12, boxShadow: "0 4px 12px rgba(192,57,43,0.3)" },
        notif: (type) => ({ position: "fixed", top: 32, right: 32, background: type === "error" ? "#c62828" : "#2e7d32", color: "#fff", padding: "14px 24px", borderRadius: 12, zIndex: 300, fontSize: 14, fontWeight: 600, boxShadow: "0 6px 20px rgba(0,0,0,0.2)", maxWidth: 320 }),
        
        // MODAL POPUP STYLES
        modalOverlay: { position: "fixed", inset: 0, background: "rgba(0,0,0,0.5)", zIndex: 500, display: "flex", alignItems: "center", justifyContent: "center", padding: 20 },
        modal: { background: "#fff", borderRadius: 20, width: "100%", maxWidth: 650, boxShadow: "0 10px 40px rgba(0,0,0,0.15)", overflow: "hidden", display: "flex", flexDirection: "column", maxHeight: "85vh" },
        modalHeader: { background: "linear-gradient(135deg, #c0392b, #8e1a0e)", color: "#fff", padding: "20px 24px", display: "flex", justifyContent: "space-between", alignItems: "center" },
        modalBody: { padding: 24, overflowY: "auto" }
      };

      const Notification = () => notification && (
        <div style={s.notif(notification.type)}>{notification.msg}</div>
      );

      // Login Panel View
      if (!adminAuth) {
        return (
          <div style={{ minHeight: "100vh", display: "flex", alignItems: "center", justifyContent: "center", background: "#fff9f5" }}>
            <Notification />
            <div style={{ background: "#fff", borderRadius: 24, padding: 48, boxShadow: "0 12px 48px rgba(192,57,43,0.1)", width: 380, textAlign: "center", border: "1px solid #fce4ec" }}>
              <div style={{ fontSize: 56, marginBottom: 16 }}>🔐</div>
              <h1 style={{ fontSize: 26, fontWeight: 700, color: "#8e1a0e", marginBottom: 6 }}>Admin Control Panel</h1>
              <div style={{ fontSize: 12, color: "#a1887f", marginBottom: 32, letterSpacing: 2, textTransform: "uppercase" }}>Kaneez Creations</div>
              
              <div style={{ textAlign: "left", marginBottom: 20 }}>
                <label style={s.label}>Password</label>
                <input
                  type="password"
                  placeholder="Enter admin password"
                  value={adminPass}
                  onChange={e => setAdminPass(e.target.value)}
                  onKeyDown={e => e.key === "Enter" && handleAdminLogin()}
                  style={{ ...s.input, textAlign: "center" }}
                />
              </div>
              
              <button style={{ ...s.saveBtn, width: "100%", padding: "14px" }} onClick={handleAdminLogin}>Login to Dashboard →</button>
              <div style={{ fontSize: 11, color: "#bdbdbd", marginTop: 24 }}>Default password: <strong>kaneez123</strong></div>
            </div>
          </div>
        );
      }

      // Order Details Popup Modal Component
      const OrderDetailsModal = () => {
        if (!selectedOrderDetails) return null;
        const ord = selectedOrderDetails;
        return (
          <div style={s.modalOverlay}>
            <div style={s.modal}>
              <div style={s.modalHeader}>
                <h3 style={{ fontSize: 18, fontWeight: 700 }}>📋 Order Invoice {ord.id}</h3>
                <button style={{ background: "none", border: "none", color: "#fff", fontSize: 22, cursor: "pointer" }} onClick={() => setSelectedOrderDetails(null)}>✕</button>
              </div>
              <div style={s.modalBody}>
                {/* Customer Details */}
                <div style={{ background: "#fff9f5", border: "1px solid #fce4ec", borderRadius: 12, padding: 16, marginBottom: 20 }}>
                  <h4 style={{ color: "#8e1a0e", fontSize: 14, fontWeight: 700, textTransform: "uppercase", letterSpacing: 0.5, marginBottom: 10 }}>Customer Information</h4>
                  <p style={{ fontSize: 14, margin: "4px 0" }}>👤 <strong>Name:</strong> {ord.customer.name}</p>
                  <p style={{ fontSize: 14, margin: "4px 0" }}>📞 <strong>Phone:</strong> {ord.customer.phone}</p>
                  <p style={{ fontSize: 14, margin: "4px 0" }}>📍 <strong>Address:</strong> {ord.customer.address} {ord.customer.city ? `, ${ord.customer.city}` : ""}</p>
                  <p style={{ fontSize: 14, margin: "4px 0" }}>💳 <strong>Payment Method:</strong> {ord.method}</p>
                  {ord.customer.transactionId && <p style={{ fontSize: 14, margin: "4px 0" }}>🏷️ <strong>TID (Transaction ID):</strong> {ord.customer.transactionId}</p>}
                  <p style={{ fontSize: 14, margin: "4px 0" }}>🕒 <strong>Date / Time:</strong> {ord.date}</p>
                </div>

                {/* Items List */}
                <h4 style={{ color: "#8e1a0e", fontSize: 14, fontWeight: 700, textTransform: "uppercase", letterSpacing: 0.5, marginBottom: 12 }}>Items List</h4>
                <div style={{ border: "1px solid #fce4ec", borderRadius: 12, overflow: "hidden", marginBottom: 20 }}>
                  <table style={{ width: "100%", borderCollapse: "collapse" }}>
                    <thead>
                      <tr style={{ background: "#fce4ec", borderBottom: "1px solid #ffcdd2" }}>
                        <th style={{ padding: "10px 14px", textAlign: "left", fontSize: 12, color: "#8e1a0e", fontWeight: 700 }}>Item</th>
                        <th style={{ padding: "10px 14px", textAlign: "center", fontSize: 12, color: "#8e1a0e", fontWeight: 700 }}>Size</th>
                        <th style={{ padding: "10px 14px", textAlign: "center", fontSize: 12, color: "#8e1a0e", fontWeight: 700 }}>Qty</th>
                        <th style={{ padding: "10px 14px", textAlign: "right", fontSize: 12, color: "#8e1a0e", fontWeight: 700 }}>Price</th>
                      </tr>
                    </thead>
                    <tbody>
                      {ord.items.map(item => (
                        <tr key={item.id+item.size} style={{ borderBottom: "1px solid #fce4ec" }}>
                          <td style={{ padding: "12px 14px", fontSize: 13 }}>{item.image} {item.name}</td>
                          <td style={{ padding: "12px 14px", fontSize: 13, textAlign: "center" }}>{item.size}</td>
                          <td style={{ padding: "12px 14px", fontSize: 13, textAlign: "center" }}>{item.qty}</td>
                          <td style={{ padding: "12px 14px", fontSize: 13, textAlign: "right", fontWeight: 700, color: "#c0392b" }}>Rs. {(item.price * item.qty).toLocaleString()}</td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>

                {/* Total */}
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", fontWeight: 700, fontSize: 16 }}>
                  <span>Total Amount Paid/Due:</span>
                  <span style={{ color: "#c0392b", fontSize: 20 }}>Rs. {ord.total.toLocaleString()}</span>
                </div>
              </div>
            </div>
          </div>
        );
      };

      // Main Admin Panel Component
      return (
        <div style={s.page}>
          <Notification />
          <OrderDetailsModal />
          
          {/* Header Bar */}
          <div style={{ background: "linear-gradient(135deg,#c0392b,#8e1a0e)", padding: "14px 32px", display: "flex", justifyContent: "space-between", alignItems: "center", boxShadow: "0 4px 12px rgba(0,0,0,0.1)" }}>
            <span style={{ color: "#fff", fontWeight: 700, fontSize: 18, letterSpacing: 1 }}>🛍️ Kaneez Creations — Administration</span>
            <div style={{ display: "flex", gap: 12 }}>
              <a href="index.html" style={{ textDecoration: "none", background: "rgba(255,255,255,0.2)", color: "#fff", padding: "8px 18px", borderRadius: 20, fontSize: 13, fontWeight: 600, transition: "background 0.2s" }} target="_blank">View Live Store ↗</a>
            </div>
          </div>

          <div style={s.adminWrap}>
            {/* Sidebar Navigation */}
            <div style={s.sidebar}>
              <div style={{ padding: "0 24px 28px", borderBottom: "1px solid rgba(255,255,255,0.1)", marginBottom: 20 }}>
                <div style={{ color: "#ff7043", fontWeight: 700, fontSize: 16 }}>Control Center</div>
                <div style={{ color: "#8d6e63", fontSize: 11, letterSpacing: 1, textTransform: "uppercase", marginTop: 2 }}>Logged in as Admin</div>
              </div>
              
              <div style={s.sideItem(adminView === "dashboard")} onClick={() => setAdminView("dashboard")}>
                <span>📊 Dashboard</span>
              </div>
              
              <div style={s.sideItem(adminView === "products")} onClick={() => { setAdminView("products"); setEditProduct(null); }}>
                <span>📦 Manage Products</span>
              </div>

              <div style={s.sideItem(adminView === "add")} onClick={() => { setAdminView("add"); setEditProduct(null); }}>
                <span>➕ Add New Product</span>
              </div>

              <div style={s.sideItem(adminView === "lowstock")} onClick={() => setAdminView("lowstock")}>
                <span>⚠️ Low Stock Alerts</span>
              </div>

              <div style={s.sideItem(adminView === "orders")} onClick={() => setAdminView("orders")}>
                <span>📋 Manage Orders</span>
                {pendingCount > 0 && (
                  <span style={{ background: "#c62828", color: "#fff", borderRadius: "50%", minWidth: 20, height: 20, fontSize: 11, display: "flex", alignItems: "center", justifyContent: "center", padding: "0 4px", fontWeight: 700 }}>
                    {pendingCount}
                  </span>
                )}
              </div>

              <div style={{ flex: 1 }} />
              <div style={s.sideItem(false)} onClick={() => { setAdminAuth(false); setAdminPass(""); }}>🚪 Logout</div>
            </div>

            {/* Content Area */}
            <div style={s.adminMain}>
              
              {/* VIEW: DASHBOARD */}
              {adminView === "dashboard" && (
                <>
                  <h2 style={s.adminTitle}>📊 Analytics Dashboard</h2>
                  
                  <div style={s.statRow}>
                    <div style={s.statCard("linear-gradient(135deg,#c0392b,#8e1a0e)")}>
                      <div style={s.statNum}>{products.length}</div>
                      <div style={s.statLabel}>Total Products</div>
                    </div>
                    <div style={s.statCard("linear-gradient(135deg,#1565c0,#0d47a1)")}>
                      <div style={s.statNum}>{totalStock}</div>
                      <div style={s.statLabel}>Total Stock</div>
                    </div>
                    <div style={s.statCard("linear-gradient(135deg,#2e7d32,#1b5e20)")}>
                      <div style={s.statNum}>{totalOrders}</div>
                      <div style={s.statLabel}>Total Orders</div>
                    </div>
                    <div style={s.statCard("linear-gradient(135deg,#bf360c,#b71c1c)")}>
                      <div style={s.statNum}>Rs. {totalRevenue.toLocaleString()}</div>
                      <div style={s.statLabel}>Completed Revenue</div>
                    </div>
                  </div>

                  {lowStock.length > 0 && (
                    <div style={{ background: "#fff3e0", border: "2px solid #ff7043", borderRadius: 16, padding: "20px 24px", marginBottom: 32, boxShadow: "0 4px 12px rgba(255,112,67,0.08)" }}>
                      <div style={{ fontWeight: 700, color: "#e65100", marginBottom: 8, fontSize: 16 }}>⚠️ Critical Stock Notice</div>
                      {lowStock.map(p => (
                        <div key={p.id} style={{ fontSize: 14, color: "#bf360c", padding: "4px 0" }}>
                          • <strong>{p.name}</strong> ({p.category}) is running out — only <strong>{p.stock}</strong> pieces left!
                        </div>
                      ))}
                    </div>
                  )}

                  <div style={{ background: "#fff", borderRadius: 16, padding: 28, boxShadow: "0 4px 20px rgba(0,0,0,0.03)", border: "1px solid #fce4ec" }}>
                    <div style={{ fontWeight: 700, color: "#8e1a0e", marginBottom: 20, fontSize: 18 }}>📦 Category Breakdowns</div>
                    {["Girls","Boys","Infants"].map(cat => {
                      const count = products.filter(p => p.category === cat).length;
                      const percentage = products.length > 0 ? (count / products.length) * 100 : 0;
                      return (
                        <div key={cat} style={{ display: "flex", alignItems: "center", gap: 16, marginBottom: 18 }}>
                          <div style={{ width: 90, fontSize: 14, fontWeight: 600 }}>{cat}</div>
                          <div style={{ flex: 1, background: "#fce4ec", borderRadius: 8, height: 16, overflow: "hidden" }}>
                            <div style={{ width: `${percentage}%`, background: "linear-gradient(90deg,#c0392b,#ff7043)", height: "100%", borderRadius: 8 }} />
                          </div>
                          <div style={{ fontSize: 14, fontWeight: 700, color: "#c0392b", width: 30, textAlign: "right" }}>{count}</div>
                        </div>
                      );
                    })}
                  </div>
                </>
              )}

              {/* VIEW: MANAGE PRODUCTS */}
              {adminView === "products" && (
                <>
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 24 }}>
                    <h2 style={s.adminTitle}>📦 Inventory List ({products.length})</h2>
                    <button style={s.saveBtn} onClick={() => setAdminView("add")}>+ Add New Product</button>
                  </div>
                  
                  <div style={s.tableContainer}>
                    <table style={s.table}>
                      <thead>
                        <tr>
                          {["Image","Name","Category","Price","Stock","Sizes","Featured","Actions"].map(h => <th key={h} style={s.th}>{h}</th>)}
                        </tr>
                      </thead>
                      <tbody>
                        {products.map(p => (
                          <tr key={p.id}>
                            <td style={s.td}>
                              {p.image && (p.image.startsWith('data') || p.image.startsWith('http') || p.image.includes('/')) ? (
                                <img src={p.image} alt={p.name} style={{ width: 40, height: 40, objectFit: 'cover', borderRadius: 4 }} />
                              ) : (
                                <span style={{ fontSize: 28 }}>{p.image}</span>
                              )}
                            </td>
                            <td style={{ ...s.td, fontWeight: 700 }}>{p.name}</td>
                            <td style={s.td}>
                              <span style={{ background: "#fce4ec", color: "#c0392b", padding: "4px 12px", borderRadius: 20, fontSize: 12, fontWeight: 700, textTransform: "uppercase", letterSpacing: 1 }}>
                                {p.category}
                              </span>
                            </td>
                            <td style={{ ...s.td, fontWeight: 700, color: "#c0392b" }}>Rs. {p.price.toLocaleString()}</td>
                            <td style={{ ...s.td, color: p.stock < 5 ? "#c62828" : "#2e7d32", fontWeight: 700 }}>{p.stock}</td>
                            <td style={{ ...s.td, fontSize: 12, color: "#7b5a4a" }}>{p.size.join(", ")}</td>
                            <td style={s.td}>{p.featured ? "⭐ Yes" : "—"}</td>
                            <td style={s.td}>
                              <button style={s.editBtn} onClick={() => startEdit(p)}>Edit</button>
                              <button style={s.delBtn} onClick={() => handleDeleteProduct(p.id)}>Delete</button>
                            </td>
                          </tr>
                        ))}
                      </tbody>
                    </table>
                  </div>
                </>
              )}

              {/* VIEW: ADD / EDIT PRODUCT */}
              {adminView === "add" && (
                <>
                  <h2 style={s.adminTitle}>{editProduct ? "✏️ Edit Product Details" : "➕ Add New Product"}</h2>
                  <div style={{ background: "#fff", borderRadius: 20, padding: 36, boxShadow: "0 6px 24px rgba(0,0,0,0.03)", border: "1px solid #fce4ec", maxWidth: 800 }}>
                    <div style={s.formGrid}>
                      <div style={s.formGroup}>
                        <label style={s.label}>Product Name *</label>
                        <input style={s.input} value={newProduct.name} onChange={e => setNewProduct({...newProduct, name: e.target.value})} placeholder="e.g. Elegant Frock" />
                      </div>
                      <div style={s.formGroup}>
                        <label style={s.label}>Category *</label>
                        <select style={s.input} value={newProduct.category} onChange={e => setNewProduct({...newProduct, category: e.target.value})}>
                          <option>Girls</option>
                          <option>Boys</option>
                          <option>Infants</option>
                        </select>
                      </div>
                      <div style={s.formGroup}>
                        <label style={s.label}>Price (Rs.) *</label>
                        <input style={s.input} type="number" value={newProduct.price} onChange={e => setNewProduct({...newProduct, price: e.target.value})} placeholder="1200" />
                      </div>
                      <div style={s.formGroup}>
                        <label style={s.label}>Stock Quantity *</label>
                        <input style={s.input} type="number" value={newProduct.stock} onChange={e => setNewProduct({...newProduct, stock: e.target.value})} placeholder="10" />
                      </div>
                      <div style={s.formGroup}>
                        <label style={s.label}>Sizes (comma separated) *</label>
                        <input style={s.input} value={newProduct.size} onChange={e => setNewProduct({...newProduct, size: e.target.value})} placeholder="2-3Y, 4-5Y, 6-7Y" />
                      </div>
                        <div style={s.formGroup}>
                          <label style={s.label}>Product Image</label>
                          <input type="file" accept="image/*" style={s.input} onChange={handleImageUpload} />
                          {newProduct.image && (newProduct.image.startsWith('data') || newProduct.image.startsWith('http') || newProduct.image.includes('/')) ? (
                            <img src={newProduct.image} alt="Preview" style={{marginTop:8, maxWidth:"100%", borderRadius:8}} />
                          ) : (
                            newProduct.image && <span style={{ fontSize: 40, display: "block", marginTop: 8 }}>{newProduct.image}</span>
                          )}
                        </div>
                    </div>
                    
                    <div style={s.formGroup}>
                      <label style={s.label}>Description</label>
                      <textarea 
                        style={{ ...s.input, minHeight: 100, resize: "vertical" }} 
                        value={newProduct.description} 
                        onChange={e => setNewProduct({...newProduct, description: e.target.value})} 
                        placeholder="Describe material, embroidery details, fit etc..." 
                      />
                    </div>
                    
                    <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 24 }}>
                      <input 
                        type="checkbox" 
                        id="featured" 
                        checked={newProduct.featured} 
                        onChange={e => setNewProduct({...newProduct, featured: e.target.checked})} 
                        style={{ width: 18, height: 18, cursor: "pointer" }} 
                      />
                      <label htmlFor="featured" style={{ fontSize: 14, fontWeight: 600, color: "#8e1a0e", cursor: "pointer" }}>⭐ Feature this product on the home page</label>
                    </div>
                    
                    <div style={{ display: "flex", gap: 16 }}>
                      <button style={s.saveBtn} onClick={handleSaveProduct}>{editProduct ? "✅ Update Product" : "➕ Save Product"}</button>
                      <button 
                        style={{ ...s.saveBtn, background: "#757575", boxShadow: "none" }} 
                        onClick={() => { 
                          setEditProduct(null); 
                          setNewProduct({ name:"", category:"Girls", size:"", price:"", stock:"", image:"👗", description:"", featured:false }); 
                          setAdminView("products"); 
                        }}
                      >
                        Cancel
                      </button>
                    </div>
                  </div>
                </>
              )}

              {/* VIEW: LOW STOCK ALERTS */}
              {adminView === "lowstock" && (
                <>
                  <h2 style={s.adminTitle}>⚠️ Low Stock Alerts</h2>
                  
                  {lowStock.length === 0 ? (
                    <div style={{ background: "#e8f5e9", borderRadius: 16, padding: 36, textAlign: "center", color: "#2e7d32", fontSize: 16, fontWeight: 600, border: "1px solid #a5d6a7" }}>
                      🎉 Excellent! All products are well-stocked.
                    </div>
                  ) : (
                    <div style={s.tableContainer}>
                      <table style={s.table}>
                        <thead>
                          <tr>
                            {["Product","Category","Price","Stock Left","Action"].map(h => <th key={h} style={s.th}>{h}</th>)}
                          </tr>
                        </thead>
                        <tbody>
                          {lowStock.map(p => (
                            <tr key={p.id}>
                              <td style={{ ...s.td, fontWeight: 700 }}>
                                {p.image && (p.image.startsWith('data') || p.image.startsWith('http') || p.image.includes('/')) ? (
                                  <img src={p.image} alt={p.name} style={{ width: 30, height: 30, objectFit: 'cover', borderRadius: 4, marginRight: 10, display: 'inline-block', verticalAlign: 'middle' }} />
                                ) : (
                                  <span style={{ fontSize: 24, marginRight: 10, display: 'inline-block', verticalAlign: 'middle' }}>{p.image}</span>
                                )}
                                <span style={{ verticalAlign: 'middle' }}>{p.name}</span>
                              </td>
                              <td style={s.td}>
                                <span style={{ background: "#fce4ec", color: "#c0392b", padding: "4px 12px", borderRadius: 20, fontSize: 12, fontWeight: 700, textTransform: "uppercase" }}>
                                  {p.category}
                                </span>
                              </td>
                              <td style={{ ...s.td, color: "#c0392b", fontWeight: 700 }}>Rs. {p.price.toLocaleString()}</td>
                              <td style={{ ...s.td, color: "#c62828", fontWeight: 700 }}>{p.stock} left!</td>
                              <td style={s.td}>
                                <button style={s.editBtn} onClick={() => startEdit(p)}>Restock / Edit</button>
                              </td>
                            </tr>
                          ))}
                        </tbody>
                      </table>
                    </div>
                  )}
                </>
              )}

              {/* VIEW: MANAGE ORDERS */}
              {adminView === "orders" && (
                <>
                  <h2 style={s.adminTitle}>📋 Customer Orders List ({orders.length})</h2>
                  
                  {orders.length === 0 ? (
                    <div style={{ background: "#fff", borderRadius: 16, padding: 40, textAlign: "center", color: "#7b5a4a", border: "1px solid #fce4ec" }}>
                      <div style={{ fontSize: 48, marginBottom: 12 }}>📋</div>
                      <div style={{ fontSize: 15, fontWeight: 600 }}>No orders have been placed yet.</div>
                    </div>
                  ) : (
                    <div style={s.tableContainer}>
                      <table style={s.table}>
                        <thead>
                          <tr>
                            {["Order ID / Date","Customer Details","Payment Method","Total","Status","Change Status","Actions"].map(h => <th key={h} style={s.th}>{h}</th>)}
                          </tr>
                        </thead>
                        <tbody>
                          {orders.map(o => (
                            <tr key={o.id}>
                              <td style={s.td}>
                                <span style={{ fontWeight: 700, color: "#8e1a0e" }}>{o.id}</span>
                                <div style={{ fontSize: 11, color: "#9e9e9e", marginTop: 4 }}>{o.date}</div>
                              </td>
                              <td style={s.td}>
                                <strong>{o.customer.name}</strong>
                                <div style={{ fontSize: 11, color: "#757575", marginTop: 2 }}>📞 {o.customer.phone}</div>
                                <div style={{ fontSize: 11, color: "#757575", marginTop: 2 }}>📍 {o.customer.address} {o.customer.city ? `, ${o.customer.city}` : ""}</div>
                                {o.customer.transactionId && <div style={{ fontSize: 11, color: "#0d47a1", fontWeight: 700, marginTop: 2 }}>TID: {o.customer.transactionId}</div>}
                              </td>
                              <td style={{ ...s.td, fontWeight: 600 }}>{o.method}</td>
                              <td style={{ ...s.td, fontWeight: 700, color: "#c0392b" }}>Rs. {o.total.toLocaleString()}</td>
                              <td style={s.td}><span style={s.badge(o.status)}>{o.status}</span></td>
                              <td style={s.td}>
                                <select 
                                  value={o.status} 
                                  onChange={e => handleUpdateOrderStatus(o.id, e.target.value)}
                                  style={{ padding: "6px 10px", border: "1px solid #cfd8dc", borderRadius: 8, fontSize: 12, outline: "none", fontFamily: "inherit" }}
                                >
                                  <option value="Pending">Pending</option>
                                  <option value="Shipped">Shipped</option>
                                  <option value="Completed">Completed</option>
                                  <option value="Cancelled">Cancelled</option>
                                </select>
                              </td>
                              <td style={s.td}>
                                <button style={s.editBtn} onClick={() => setSelectedOrderDetails(o)}>View Items</button>
                                <button style={s.delBtn} onClick={() => handleDeleteOrder(o.id)}>Delete</button>
                              </td>
                            </tr>
                          ))}
                        </tbody>
                      </table>
                    </div>
                  )}
                </>
              )}

            </div>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<KaneezAdmin />);
  </script>
</body>
</html>
